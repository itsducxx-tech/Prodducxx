<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DucXx</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
background-image:url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=1200');
background-size:cover;
background-position:center;
}

.card{
width:340px;
padding:30px;
border-radius:25px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.15);
}

img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid white;
}

h1{
color:#fff;
margin:20px 0;
font-size:38px;
text-shadow:0 0 15px #fff;
}

.icons a{
color:#fff;
font-size:35px;
margin:0 10px;
text-decoration:none;
transition:.3s;
}

.icons a:hover{
transform:scale(1.2);
}

p{
color:#fff;
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<div class="card">

<img src="profile.jpg" alt="profile">

<h1>prod.by.ducxx</h1>

<div class="icons">
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-soundcloud"></i></a>
<a href="#"><i class="fab fa-telegram"></i></a>
<a href="#"><i class="fas fa-envelope"></i></a>
</div>

<p><i class="fas fa-eye"></i> 1,221</p>

</div>

</body>
</html>
